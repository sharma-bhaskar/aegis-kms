version = 3.8.3
runner.dialect = scala3
maxColumn = 110
align.preset = more
align.openParenCallSite = false
align.openParenDefnSite = false
newlines.source = keep
newlines.beforeMultiline = keep
rewrite.rules = [RedundantBraces, RedundantParens, SortModifiers, SortImports]
indent.main = 2
indent.ctorSite = 4
fileOverride {
  "glob:**/*.sbt" {
    runner.dialect = sbt1
  }
}
