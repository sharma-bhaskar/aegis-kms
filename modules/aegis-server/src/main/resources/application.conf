aegis {
  http {
    host = "0.0.0.0"
    host = ${?AEGIS_HTTP_HOST}
    port = 8080
    port = ${?AEGIS_HTTP_PORT}
  }

  persistence {
    journal {
      # "in-memory"  — non-durable, suitable for tests and demos. State is lost on restart.
      # "postgres"   — Doobie/Hikari-backed Postgres. Bootstraps schema on startup.
      kind = "in-memory"
      kind = ${?AEGIS_JOURNAL_KIND}

      postgres {
        jdbc-url  = "jdbc:postgresql://localhost:5432/aegis"
        jdbc-url  = ${?AEGIS_JDBC_URL}
        username  = "aegis"
        username  = ${?AEGIS_JDBC_USERNAME}
        password  = ""
        password  = ${?AEGIS_JDBC_PASSWORD}
        pool-size = 8
        pool-size = ${?AEGIS_JDBC_POOL_SIZE}
      }
    }
  }
}

pekko {
  loglevel        = "INFO"
  loggers         = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter  = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
}
